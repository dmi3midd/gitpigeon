services:
  gitpigeon:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/sql.db
    volumes:
      - gitpigeon-data:/app/data
    restart: unless-stopped

volumes:
  gitpigeon-data:
